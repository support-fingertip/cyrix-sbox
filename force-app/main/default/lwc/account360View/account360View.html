<template>
    <!-- Loading spinner -->
    <template lwc:if={isLoading}>
        <c-on-loading-screen></c-on-loading-screen>
    </template>

    <!-- Error state -->
    <template lwc:if={error}>
        <div class="error-container">
            <lightning-icon icon-name="utility:error" size="small" alternative-text="Error"></lightning-icon>
            <p>{error}</p>
            <lightning-button label="Retry" onclick={handleRefresh} variant="brand"></lightning-button>
        </div>
    </template>

    <!-- Main content -->
    <template lwc:if={accountData}>
        <div class="account-360">

            <!-- Account Header -->
            <div class="account-header">
                <div class="account-header-top">
                    <div class="account-header-info">
                        <div class="account-avatar">
                            <lightning-icon icon-name="standard:account" size="medium" alternative-text="Account"></lightning-icon>
                        </div>
                        <div class="account-details">
                            <h1 class="account-name">{accountData.account.Name}</h1>
                            <template lwc:if={accountData.account.Customer_Code__c}>
                                <p class="account-code">Code: {accountData.account.Customer_Code__c}</p>
                            </template>
                            <template lwc:if={accountData.account.Customer_Type__c}>
                                <p class="account-type">{accountData.account.Customer_Type__c}</p>
                            </template>
                        </div>
                    </div>
                    <div class="account-header-actions">
                        <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh" onclick={handleRefresh} variant="border-filled"></lightning-button-icon>
                    </div>
                </div>

                <!-- Account quick info -->
                <div class="account-quick-info">
                    <template lwc:if={accountData.account.Phone}>
                        <div class="quick-info-item">
                            <lightning-icon icon-name="utility:call" size="xx-small" alternative-text="Phone"></lightning-icon>
                            <span>{accountData.account.Phone}</span>
                        </div>
                    </template>
                    <template lwc:if={accountData.account.Status__c}>
                        <div class="quick-info-item">
                            <lightning-icon icon-name="utility:record" size="xx-small" alternative-text="Status"></lightning-icon>
                            <span>{accountData.account.Status__c}</span>
                        </div>
                    </template>
                    <template lwc:if={accountData.ownerName}>
                        <div class="quick-info-item">
                            <lightning-icon icon-name="utility:user" size="xx-small" alternative-text="Owner"></lightning-icon>
                            <span>{accountData.ownerName}</span>
                        </div>
                    </template>
                    <template lwc:if={hasAddress}>
                        <div class="quick-info-item">
                            <lightning-icon icon-name="utility:location" size="xx-small" alternative-text="Address"></lightning-icon>
                            <span>{accountAddress}</span>
                        </div>
                    </template>
                </div>
            </div>

            <div class="dropdowns">

                <!-- Business Summary Section -->
                <div class="dropdown">
                    <div class="dropdown-head">
                        <div class="dropdown-head-left" onclick={toggleSummaryDropdown}>
                            <i class="material-icons dropdown-head-nav-icon">
                                <lightning-icon icon-name="utility:chevronup" size="x-small" alternative-text="" class="chevron-icon-summary chevron-icon"></lightning-icon>
                            </i>
                            <h4 class="dropdown-head-title visitHeading">
                                <img src={icons.summery} width="15" height="15" alt=""> &nbsp;&nbsp;
                                Business Summary
                            </h4>
                        </div>
                    </div>
                    <div class="dropdown-body-summary dropdown-body active">
                        <div class="dropdown-head-sum">
                            <div class="dashboard-container">
                                <div class="tile tile-visits">
                                    <p class="title">Total Visits</p>
                                    <p class="amount">{accountData.totalVisits}</p>
                                </div>
                                <div class="tile tile-completed">
                                    <p class="title">Completed</p>
                                    <p class="amount">{accountData.completedVisits}</p>
                                </div>
                                <div class="tile tile-orders">
                                    <p class="title">Total Orders</p>
                                    <p class="amount">{accountData.totalOrders}</p>
                                </div>
                                <div class="tile tile-amount">
                                    <p class="title">Order Value</p>
                                    <p class="amount">{accountData.totalOrderAmount}</p>
                                </div>
                            </div>

                            <!-- Visit status breakdown -->
                            <div class="status-breakdown">
                                <div class="status-item">
                                    <span class="status-dot status-dot-planned"></span>
                                    <span class="status-label">Planned</span>
                                    <span class="status-count">{accountData.plannedVisits}</span>
                                </div>
                                <div class="status-item">
                                    <span class="status-dot status-dot-inprogress"></span>
                                    <span class="status-label">In Progress</span>
                                    <span class="status-count">{accountData.inProgressVisits}</span>
                                </div>
                                <div class="status-item">
                                    <span class="status-dot status-dot-completed"></span>
                                    <span class="status-label">Completed</span>
                                    <span class="status-count">{accountData.completedVisits}</span>
                                </div>
                                <div class="status-item">
                                    <span class="status-dot status-dot-missed"></span>
                                    <span class="status-label">Missed</span>
                                    <span class="status-count">{accountData.missedVisits}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recent Visits Section -->
                <div class="dropdown">
                    <div class="dropdown-head">
                        <div class="dropdown-head-left" onclick={toggleVisitsDropdown}>
                            <i class="material-icons dropdown-head-nav-icon">
                                <lightning-icon icon-name="utility:chevronup" size="x-small" alternative-text="" class="chevron-icon-visits chevron-icon"></lightning-icon>
                            </i>
                            <h4 class="dropdown-head-title visitHeading">
                                <lightning-icon icon-name="standard:visit" size="xx-small" alternative-text="Visits" class="section-icon"></lightning-icon> &nbsp;
                                Visits ({accountData.totalVisits})
                            </h4>
                        </div>
                    </div>
                    <div class="dropdown-body-visits dropdown-body active">
                        <div class="section-content">
                            <template lwc:if={hasVisits}>
                                <table class="dropdown-table">
                                    <tr>
                                        <th>Visit</th>
                                        <th>Date</th>
                                        <th>Status</th>
                                        <th>Type</th>
                                    </tr>
                                    <template for:each={displayVisits} for:item="visit">
                                        <tr key={visit.id} class="clickable-row" data-id={visit.id} onclick={navigateToRecord}>
                                            <td>{visit.name}</td>
                                            <td>{visit.formattedVisitDate}</td>
                                            <td>
                                                <span class={visit.statusClass}>{visit.status}</span>
                                            </td>
                                            <td>{visit.visitType}</td>
                                        </tr>
                                    </template>
                                </table>
                                <template lwc:if={hasMoreVisits}>
                                    <div class="view-all-link">
                                        <lightning-button label={visitToggleLabel} variant="base" onclick={toggleAllVisits}></lightning-button>
                                    </div>
                                </template>
                            </template>
                            <template lwc:else>
                                <div class="slds-align_absolute-center empty-state">
                                    <b>No visits found for this account.</b>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Orders Section -->
                <div class="dropdown">
                    <div class="dropdown-head">
                        <div class="dropdown-head-left" onclick={toggleOrdersDropdown}>
                            <i class="material-icons dropdown-head-nav-icon">
                                <lightning-icon icon-name="utility:chevrondown" size="x-small" alternative-text="" class="chevron-icon-orders chevron-icon"></lightning-icon>
                            </i>
                            <h4 class="dropdown-head-title visitHeading">
                                <img src={icons.order} width="15" height="15" alt=""> &nbsp;&nbsp;
                                Orders ({accountData.totalOrders})
                            </h4>
                        </div>
                    </div>
                    <div class="dropdown-body-orders dropdown-body">
                        <div class="section-content">
                            <template lwc:if={hasOrders}>
                                <table class="dropdown-table">
                                    <tr>
                                        <th>Order #</th>
                                        <th>Date</th>
                                        <th>Amount</th>
                                        <th>Status</th>
                                    </tr>
                                    <template for:each={displayOrders} for:item="order">
                                        <tr key={order.id} class="clickable-row" data-id={order.id} onclick={navigateToRecord}>
                                            <td>{order.orderNumber}</td>
                                            <td>{order.formattedDate}</td>
                                            <td>{order.totalAmount}</td>
                                            <td>{order.status}</td>
                                        </tr>
                                    </template>
                                </table>
                                <template lwc:if={hasMoreOrders}>
                                    <div class="view-all-link">
                                        <lightning-button label={orderToggleLabel} variant="base" onclick={toggleAllOrders}></lightning-button>
                                    </div>
                                </template>
                            </template>
                            <template lwc:else>
                                <div class="slds-align_absolute-center empty-state">
                                    <b>No orders found for this account.</b>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Contacts Section -->
                <div class="dropdown">
                    <div class="dropdown-head">
                        <div class="dropdown-head-left" onclick={toggleContactsDropdown}>
                            <i class="material-icons dropdown-head-nav-icon">
                                <lightning-icon icon-name="utility:chevrondown" size="x-small" alternative-text="" class="chevron-icon-contacts chevron-icon"></lightning-icon>
                            </i>
                            <h4 class="dropdown-head-title visitHeading">
                                <lightning-icon icon-name="standard:contact" size="xx-small" alternative-text="Contacts" class="section-icon"></lightning-icon> &nbsp;
                                Contacts
                            </h4>
                        </div>
                    </div>
                    <div class="dropdown-body-contacts dropdown-body">
                        <div class="section-content">
                            <template lwc:if={hasContacts}>
                                <table class="dropdown-table">
                                    <tr>
                                        <th>Name</th>
                                        <th>Title</th>
                                        <th>Phone</th>
                                        <th>Email</th>
                                    </tr>
                                    <template for:each={accountData.contacts} for:item="contact">
                                        <tr key={contact.Id} class="clickable-row" data-id={contact.Id} onclick={navigateToRecord}>
                                            <td>{contact.Name}</td>
                                            <td>{contact.Title}</td>
                                            <td>{contact.Phone}</td>
                                            <td>{contact.Email}</td>
                                        </tr>
                                    </template>
                                </table>
                            </template>
                            <template lwc:else>
                                <div class="slds-align_absolute-center empty-state">
                                    <b>No contacts found for this account.</b>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </template>
</template>
