<template>
    <!-- LOADING OVERLAY -->
    <template if:true={isLoading}>
        <div class="loading-overlay">
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </div>
    </template>

    <div class="quote-builder">
        <!-- PAGE HEADER -->
        <div class="page-header slds-p-around_medium">
            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                <div>
                    <h1 class="slds-text-heading_medium page-title">{pageTitle}</h1>
                    <p class="slds-text-body_small slds-m-top_xxx-small page-subtitle">
                        <template if:false={isEditMode}>Fill in the details below to create a new quote.</template>
                        <template if:true={isEditMode}>Modify the quote details and save your changes.</template>
                    </p>
                </div>
                <div class="slds-grid slds-grid_vertical-align-center">
                    <template if:true={accountName}>
                        <div class="customer-badge slds-m-right_small">
                            <lightning-icon icon-name="standard:account" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                            <span>{accountName}</span>
                        </div>
                    </template>
                    <lightning-icon icon-name="standard:quotes" size="medium"></lightning-icon>
                </div>
            </div>
        </div>

        <!-- RECORD EDIT FORM -->
        <lightning-record-edit-form
            object-api-name="Quote"
            record-id={editRecordId}
            default-values={defaultValues}
            onsubmit={handleFormSubmit}
            onsuccess={handleFormSuccess}
            onerror={handleFormError}
            density="comfy">

            <!-- ===== SECTION: QUOTE INFORMATION ===== -->
            <div class="section-card">
                <div class="section-header">
                    <lightning-icon icon-name="utility:description" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    <span>Quote Information</span>
                </div>
                <div class="section-body">
                    <!-- Hidden Name field (auto-generated by trigger) -->
                    <div class="slds-hide">
                        <lightning-input-field field-name="Name" value={quoteName}></lightning-input-field>
                    </div>
                    <div class="slds-grid slds-wrap slds-gutters_small">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_x-small">
                            <lightning-input-field field-name="Quote_Date__c" required></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_x-small">
                            <lightning-input-field field-name="Quote_Valid_Till_in_days__c" required></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_x-small">
                            <lightning-input-field field-name="OpportunityId" value={defaultOpportunityId} required></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_x-small">
                            <lightning-input-field field-name="Business_Vertical__c" required></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_x-small">
                            <lightning-input-field field-name="Shipping_Mode__c"></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_x-small">
                            <lightning-input-field field-name="Delivery__c"></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_x-small">
                            <lightning-input-field field-name="Contract_Period_From_Date__c"></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_x-small">
                            <lightning-input-field field-name="Contract_Period_End_Date__c"></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_x-small">
                            <lightning-input-field field-name="is_Active__c" value={defaultIsActive}></lightning-input-field>
                        </div>
                        <template if:true={isEditMode}>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-p-around_x-small">
                                <lightning-input-field field-name="Status"></lightning-input-field>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <!-- ===== SECTION: BILL TO / SHIP TO ===== -->
            <div class="section-card">
                <div class="section-header">
                    <lightning-icon icon-name="utility:location" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    <span>Bill To / Ship To</span>
                </div>
                <div class="section-body">
                    <div class="slds-grid slds-wrap slds-gutters_small">
                        <!-- Bill To -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <div class="address-block slds-p-around_x-small">
                                <h3 class="address-label slds-m-bottom_xx-small">
                                    <lightning-icon icon-name="utility:company" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                    Bill To
                                </h3>
                                <c-address-input
                                    label="Billing Address"
                                    name={billingAddress.name}
                                    street={billingAddress.street}
                                    city={billingAddress.city}
                                    state={billingAddress.state}
                                    postal-code={billingAddress.postalCode}
                                    country={billingAddress.country}
                                    onaddresschange={handleBillingAddressChange}>
                                </c-address-input>
                            </div>
                        </div>

                        <!-- Ship To -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <div class="address-block slds-p-around_x-small">
                                <h3 class="address-label slds-m-bottom_xx-small">
                                    <lightning-icon icon-name="utility:shipping" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                    Ship To
                                </h3>
                                <template if:true={hasShippingAddresses}>
                                    <div class="slds-p-bottom_xx-small">
                                        <lightning-combobox
                                            label="Select Shipping Address"
                                            value={selectedShippingAddressId}
                                            options={shippingAddressOptions}
                                            onchange={handleShippingAddressSelect}
                                            placeholder="Choose a shipping address...">
                                        </lightning-combobox>
                                    </div>
                                </template>
                                <template if:false={hasShippingAddresses}>
                                    <div class="slds-text-body_small slds-text-color_weak slds-p-bottom_xx-small no-address-msg">
                                        No shipping addresses found for this customer. Enter manually below.
                                    </div>
                                </template>
                                <c-address-input
                                    label="Shipping Address"
                                    name={shippingAddress.name}
                                    street={shippingAddress.street}
                                    city={shippingAddress.city}
                                    state={shippingAddress.state}
                                    postal-code={shippingAddress.postalCode}
                                    country={shippingAddress.country}
                                    onaddresschange={handleShippingAddressChange}>
                                </c-address-input>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== SECTION: PRODUCT SEARCH ===== -->
            <div class="section-card">
                <div class="section-header">
                    <lightning-icon icon-name="utility:search" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    <span>Add Products</span>
                </div>
                <div class="section-body">
                    <div class="slds-grid slds-wrap slds-gutters_small slds-grid_vertical-align-end">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_5-of-12 slds-p-around_x-small">
                            <lightning-input
                                label="Search Products"
                                value={searchTerm}
                                onchange={handleSearchTermChange}
                                placeholder="Search by name or code..."
                                type="search">
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-p-around_x-small">
                            <lightning-combobox
                                label="Category Filter"
                                value={categoryFilter}
                                options={categoryOptions}
                                onchange={handleCategoryFilterChange}
                                placeholder="All Categories">
                            </lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12 slds-p-around_x-small">
                            <lightning-button
                                label="Search"
                                variant="brand"
                                icon-name="utility:search"
                                onclick={handleSearch}
                                disabled={isSearchDisabled}
                                class="full-width-btn">
                            </lightning-button>
                        </div>
                    </div>

                    <!-- Search Results -->
                    <template if:true={showSearchResults}>
                        <div class="search-results slds-m-top_small">
                            <template if:true={hasSearchResults}>
                                <div class="table-scroll">
                                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped slds-table_fixed-layout">
                                        <thead>
                                            <tr class="slds-line-height_reset">
                                                <th scope="col" style="width:15%"><div class="slds-truncate">Product Name</div></th>
                                                <th scope="col" style="width:7%"><div class="slds-truncate">Code</div></th>
                                                <th scope="col" style="width:8%"><div class="slds-truncate">Category</div></th>
                                                <th scope="col" style="width:9%"><div class="slds-truncate">Make / Model</div></th>
                                                <th scope="col" style="width:8%"><div class="slds-truncate">Unit Price</div></th>
                                                <th scope="col" style="width:9%"><div class="slds-truncate">Tier</div></th>
                                                <th scope="col" style="width:6%"><div class="slds-truncate">HSN</div></th>
                                                <th scope="col" style="width:6%"><div class="slds-truncate">Tax %</div></th>
                                                <th scope="col" style="width:11%" title="Manager / VP / CEO"><div class="slds-truncate">Max Disc %</div></th>
                                                <th scope="col" style="width:9%" title="Total of Installation, Training, Warranty, Insurance, Transport, Promotional"><div class="slds-truncate">Cost %</div></th>
                                                <th scope="col" style="width:6%"><div class="slds-truncate">Action</div></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={searchResults} for:item="prod">
                                                <tr key={prod.pricebookEntryId}>
                                                    <td><div class="slds-truncate" title={prod.productName}>{prod.productName}</div></td>
                                                    <td><div class="slds-truncate">{prod.productCode}</div></td>
                                                    <td><div class="slds-truncate">{prod.category}</div></td>
                                                    <td><div class="slds-truncate">{prod.make} {prod.model}</div></td>
                                                    <td><div class="slds-truncate">{prod.formattedPrice}</div></td>
                                                    <td>
                                                        <template if:true={prod.hasPriceSource}>
                                                            <span class={prod.priceBadgeClass}>{prod.priceBadgeLabel}</span>
                                                        </template>
                                                    </td>
                                                    <td><div class="slds-truncate">{prod.hsnCode}</div></td>
                                                    <td><div class="slds-truncate">{prod.formattedTax}</div></td>
                                                    <td>
                                                        <div class="slds-truncate discount-cell" title={prod.discountTooltip}>
                                                            {prod.discountDisplay}
                                                        </div>
                                                    </td>
                                                    <td>
                                                        <div class="slds-truncate cost-cell" title={prod.costBreakdownTooltip}>
                                                            {prod.totalCostPercentDisplay}
                                                        </div>
                                                    </td>
                                                    <td>
                                                        <lightning-button-icon
                                                            icon-name="utility:add"
                                                            alternative-text="Add"
                                                            variant="brand"
                                                            size="small"
                                                            data-id={prod.pricebookEntryId}
                                                            onclick={handleAddProduct}>
                                                        </lightning-button-icon>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                            <template if:true={noSearchResults}>
                                <div class="slds-text-align_center slds-p-around_medium slds-text-color_weak">
                                    <lightning-icon icon-name="utility:info" size="small" class="slds-m-right_x-small"></lightning-icon>
                                    No products found matching your search.
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>

            <!-- ===== TWO-COLUMN LAYOUT: LINE ITEMS + TERMS (LEFT), SUMMARY (RIGHT) ===== -->
            <div class="main-content-grid">
              <div class="main-content-left">

            <!-- ===== SECTION: LINE ITEMS ===== -->
            <div class="section-card">
                <div class="section-header">
                    <lightning-icon icon-name="utility:cart" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    <span>Quote Line Items ({lineItemCount})</span>
                </div>
                <div class="section-body">
                    <template if:true={hasLineItems}>
                        <div class="table-scroll line-items-table">
                            <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                                <thead>
                                    <tr class="slds-line-height_reset">
                                        <th scope="col" style="width:35px"><div class="slds-truncate">#</div></th>
                                        <th scope="col" style="min-width:160px"><div class="slds-truncate">Product</div></th>
                                        <th scope="col" style="width:60px"><div class="slds-truncate">UOM</div></th>
                                        <th scope="col" style="width:75px"><div class="slds-truncate">Qty</div></th>
                                        <th scope="col" style="width:105px"><div class="slds-truncate">List Price</div></th>
                                        <th scope="col" style="width:105px"><div class="slds-truncate">Sales Price</div></th>
                                        <th scope="col" style="width:85px"><div class="slds-truncate">Disc. %</div></th>
                                        <th scope="col" style="width:90px" title="Manager / VP / CEO"><div class="slds-truncate">Max Disc %</div></th>
                                        <th scope="col" style="width:75px"><div class="slds-truncate">Tax %</div></th>
                                        <th scope="col" style="width:75px" title="Total cost % from Product"><div class="slds-truncate">Cost %</div></th>
                                        <th scope="col" style="width:100px"><div class="slds-truncate">Price Status</div></th>
                                        <th scope="col" style="width:110px"><div class="slds-truncate">Line Total</div></th>
                                        <th scope="col" style="width:45px"><div class="slds-truncate"></div></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={lineItems} for:item="item">
                                        <tr key={item.rowId}>
                                            <td class="row-number">{item.rowNumber}</td>
                                            <td>
                                                <div class="slds-truncate product-name" title={item.productName}>
                                                    {item.productName}
                                                </div>
                                                <div class="slds-text-body_small slds-text-color_weak">{item.productCode}</div>
                                                <template if:true={item.hasPriceSource}>
                                                    <span class={item.priceBadgeClass}>{item.priceBadgeLabel}</span>
                                                </template>
                                            </td>
                                            <td class="slds-text-body_small">{item.uom}</td>
                                            <td>
                                                <lightning-input
                                                    type="number"
                                                    value={item.quantity}
                                                    min="1"
                                                    step="1"
                                                    variant="label-hidden"
                                                    data-row-id={item.rowId}
                                                    data-field="quantity"
                                                    onchange={handleLineItemChange}>
                                                </lightning-input>
                                            </td>
                                            <td>
                                                <lightning-formatted-number
                                                    value={item.listPrice}
                                                    format-style="currency"
                                                    currency-code={currencyCode}>
                                                </lightning-formatted-number>
                                            </td>
                                            <td>
                                                <lightning-input
                                                    type="number"
                                                    value={item.unitPrice}
                                                    min="0"
                                                    step="0.01"
                                                    variant="label-hidden"
                                                    formatter="currency"
                                                    data-row-id={item.rowId}
                                                    data-field="unitPrice"
                                                    onchange={handleLineItemChange}>
                                                </lightning-input>
                                            </td>
                                            <td>
                                                <lightning-input
                                                    type="number"
                                                    value={item.discount}
                                                    min="0"
                                                    max="100"
                                                    step="0.01"
                                                    variant="label-hidden"
                                                    class={item.discountInputClass}
                                                    data-row-id={item.rowId}
                                                    data-field="discount"
                                                    onchange={handleLineItemChange}>
                                                </lightning-input>
                                            </td>
                                            <td>
                                                <div class="slds-truncate discount-cell" title={item.discountTooltip}>
                                                    {item.discountDisplay}
                                                </div>
                                            </td>
                                            <td class="slds-text-align_center">
                                                <template if:true={item.isServiceItem}>
                                                    <lightning-input
                                                        type="number"
                                                        value={item.taxPercent}
                                                        min="0"
                                                        max="100"
                                                        step="0.01"
                                                        variant="label-hidden"
                                                        data-row-id={item.rowId}
                                                        data-field="taxPercent"
                                                        onchange={handleLineItemChange}>
                                                    </lightning-input>
                                                </template>
                                                <template if:false={item.isServiceItem}>
                                                    {item.taxPercentDisplay}
                                                </template>
                                            </td>
                                            <td>
                                                <div class="slds-truncate cost-cell" title={item.costBreakdownTooltip}>
                                                    {item.totalCostPercentDisplay}
                                                </div>
                                            </td>
                                            <td class="slds-text-align_center">
                                                <span class={item.priceStatusBadgeClass}>{item.priceStatus}</span>
                                            </td>
                                            <td class="line-total-cell">
                                                <lightning-formatted-number
                                                    value={item.lineTotal}
                                                    format-style="currency"
                                                    currency-code={currencyCode}>
                                                </lightning-formatted-number>
                                            </td>
                                            <td>
                                                <lightning-button-icon
                                                    icon-name="utility:delete"
                                                    alternative-text="Remove"
                                                    variant="bare"
                                                    class="delete-btn"
                                                    data-row-id={item.rowId}
                                                    onclick={handleRemoveLineItem}>
                                                </lightning-button-icon>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>

                    <template if:false={hasLineItems}>
                        <div class="empty-state slds-text-align_center slds-p-around_large">
                            <lightning-icon icon-name="utility:cart" size="large" class="slds-m-bottom_small empty-icon"></lightning-icon>
                            <p class="slds-text-color_weak">No products added yet. Use the search above to find and add products.</p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- ===== SECTION: PAYMENT TERMS ===== -->
            <div class="section-card">
                <div class="section-header">
                    <lightning-icon icon-name="utility:money" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    <span>Payment Terms ({paymentTermCount})</span>
                    <lightning-button
                        label="Add Term"
                        variant="brand"
                        icon-name="utility:add"
                        onclick={handleAddPaymentTerm}
                        class="slds-m-left_auto">
                    </lightning-button>
                </div>
                <div class="section-body">
                    <template if:true={hasPaymentTerms}>
                        <div class="table-scroll">
                            <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                                <thead>
                                    <tr class="slds-line-height_reset">
                                        <th scope="col" style="width:35px"><div class="slds-truncate">#</div></th>
                                        <th scope="col"><div class="slds-truncate">Payment Term</div></th>
                                        <th scope="col" style="width:130px"><div class="slds-truncate">Percentage %</div></th>
                                        <th scope="col" style="width:45px"><div class="slds-truncate"></div></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={paymentTerms} for:item="term">
                                        <tr key={term.ptId}>
                                            <td class="row-number">{term.rowNumber}</td>
                                            <td>
                                                <lightning-input
                                                    type="text"
                                                    value={term.paymentTerm}
                                                    variant="label-hidden"
                                                    placeholder="e.g. 30% Advance"
                                                    data-pt-id={term.ptId}
                                                    data-field="paymentTerm"
                                                    onchange={handlePaymentTermChange}>
                                                </lightning-input>
                                            </td>
                                            <td>
                                                <lightning-input
                                                    type="number"
                                                    value={term.percentage}
                                                    min="0"
                                                    max="100"
                                                    step="1"
                                                    variant="label-hidden"
                                                    data-pt-id={term.ptId}
                                                    data-field="percentage"
                                                    onchange={handlePaymentTermChange}>
                                                </lightning-input>
                                            </td>
                                            <td>
                                                <lightning-button-icon
                                                    icon-name="utility:delete"
                                                    alternative-text="Remove"
                                                    variant="bare"
                                                    class="delete-btn"
                                                    data-pt-id={term.ptId}
                                                    onclick={handleRemovePaymentTerm}>
                                                </lightning-button-icon>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                                <tfoot>
                                    <tr>
                                        <td></td>
                                        <td class="slds-text-align_right"><strong>Total</strong></td>
                                        <td>
                                            <span class={percentageOverflow}><strong>{totalPercentage}%</strong></span>
                                            <template if:true={percentageOverflow}>
                                                <span class="slds-text-color_error slds-text-body_small"> (exceeds 100%)</span>
                                            </template>
                                        </td>
                                        <td></td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </template>
                    <template if:false={hasPaymentTerms}>
                        <div class="slds-text-align_center slds-p-around_medium slds-text-color_weak">
                            No payment terms added. Click "Add Term" to define payment terms.
                        </div>
                    </template>
                </div>
            </div>

              </div>
              <div class="main-content-right">

            <!-- ===== SECTION: QUOTE SUMMARY ===== -->
            <div class="section-card summary-sticky">
                <div class="section-header">
                    <lightning-icon icon-name="utility:summary" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    <span>Quote Summary</span>
                </div>
                <div class="section-body">
                    <div class="totals-box">
                        <div class="total-row">
                            <span class="total-label">Subtotal</span>
                            <span class="total-value">
                                <lightning-formatted-number value={subtotal} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                            </span>
                        </div>
                        <div class="total-row">
                            <span class="total-label">Total Discount</span>
                            <span class="total-value discount-value">
                                - <lightning-formatted-number value={totalDiscount} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                            </span>
                        </div>
                        <div class="total-row">
                            <span class="total-label">Total Tax</span>
                            <span class="total-value">
                                <lightning-formatted-number value={totalTax} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                            </span>
                        </div>
                        <template if:true={hasProductCosts}>
                            <div class="total-row subtotal-divider">
                                <span class="total-label total-label_muted">Product Costs</span>
                                <span class="total-value">
                                    <lightning-formatted-number value={totalProductCosts} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                                </span>
                            </div>
                            <div class="cost-breakdown">
                                <template for:each={productCostBreakdown} for:item="c">
                                    <div key={c.key} class="cost-breakdown-row">
                                        <span class="cost-breakdown-label">{c.label}</span>
                                        <span class="cost-breakdown-value">
                                            <lightning-formatted-number value={c.amount} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                                        </span>
                                    </div>
                                </template>
                            </div>
                        </template>
                        <div class="total-row grand-total">
                            <span class="total-label">Grand Total</span>
                            <span class="total-value">
                                <lightning-formatted-number value={grandTotal} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                            </span>
                        </div>
                    </div>
                </div>
            </div>

              </div>
            </div>

            <!-- ===== FOOTER ACTIONS ===== -->
            <div class="footer-actions slds-p-around_medium">
                <div class="slds-grid slds-grid_align-end">
                    <lightning-button
                        label="Cancel"
                        onclick={handleCancel}
                        class="slds-m-right_small">
                    </lightning-button>
                    <lightning-button
                        label={saveButtonLabel}
                        variant="brand"
                        type="submit"
                        disabled={isSaveDisabled}
                        icon-name="utility:save">
                    </lightning-button>
                </div>
            </div>

        </lightning-record-edit-form>
    </div>
</template>
