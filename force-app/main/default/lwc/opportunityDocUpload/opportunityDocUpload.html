<template>
    <lightning-card title="Document Upload" icon-name="standard:file">
        <div class="slds-p-around_medium">
            <!-- Document Type Selector -->
            <lightning-combobox
                name="documentType"
                label="Document Type"
                value={selectedDocType}
                options={documentTypeOptions}
                onchange={handleDocTypeChange}
                placeholder="Select Document Type"
                class="slds-m-bottom_medium">
            </lightning-combobox>

            <!-- File Upload -->
            <template lwc:if={selectedDocType}>
                <lightning-file-upload
                    label={uploadLabel}
                    name="fileUploader"
                    record-id={recordId}
                    onuploadfinished={handleUploadFinished}
                    accept={acceptedFormats}
                    class="slds-m-bottom_medium">
                </lightning-file-upload>
            </template>

            <!-- Document Status -->
            <div class="slds-m-top_medium">
                <h3 class="slds-text-heading_small slds-m-bottom_small">Document Status</h3>
                <div class="slds-grid slds-wrap slds-gutters_x-small">
                    <template for:each={docStatusList} for:item="doc">
                        <div key={doc.type} class="slds-col slds-size_1-of-2 slds-p-vertical_xx-small">
                            <lightning-icon
                                icon-name={doc.iconName}
                                size="xx-small"
                                class="slds-m-right_xx-small"
                                alternative-text={doc.statusText}>
                            </lightning-icon>
                            <span class={doc.statusClass}>{doc.type} - {doc.statusText}</span>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- Spinner -->
        <template lwc:if={isLoading}>
            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
        </template>
    </lightning-card>
</template>
