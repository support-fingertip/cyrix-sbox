<template>
    <!-- Send Order Email quick action -->
    <lightning-card title="Send Order Email" icon-name="standard:orders">

        <div class="slds-p-around_medium">

            <div class="slds-grid slds-wrap slds-gutters">
                <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                    <lightning-input
                        label="To"
                        type="email"
                        value={toAddress}
                        disabled
                        required>
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                    <lightning-input
                        label="CC"
                        type="text"
                        value={ccAddress}
                        onchange={handleCcChange}
                        placeholder="Separate multiple emails with comma">
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                    <lightning-input
                        label="BCC"
                        type="text"
                        value={bccAddress}
                        onchange={handleBccChange}
                        placeholder="Separate multiple emails with comma">
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                    <lightning-input
                        label="Subject"
                        type="text"
                        value={subject}
                        onchange={handleSubjectChange}
                        required>
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                    <label class="slds-form-element__label">Email Body</label>
                    <lightning-input-rich-text
                        value={body}
                        onchange={handleBodyChange}
                        placeholder="Compose your email..."
                        formats={richTextFormats}>
                    </lightning-input-rich-text>
                </div>
            </div>

            <div class="slds-m-top_medium slds-text-align_right">
                <lightning-button
                    label="Cancel"
                    onclick={handleCancel}
                    class="slds-m-right_small">
                </lightning-button>
                <lightning-button
                    label="Send Email"
                    variant="brand"
                    onclick={handleSendEmail}
                    disabled={isSending}
                    icon-name="utility:email">
                </lightning-button>
            </div>

        </div>

    </lightning-card>
</template>
