<template>
    <lightning-card title="Send Quote via WhatsApp" icon-name="standard:messaging_session">

        <div class="slds-p-around_medium">

            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </template>

            <template if:false={isLoading}>
                <!-- PDF Preview -->
                <div class="slds-m-bottom_medium">
                    <h2 class="slds-text-heading_small slds-m-bottom_small">Quote PDF Preview</h2>
                    <div class="pdf-preview-container" style="border: 1px solid #d8dde6; border-radius: 4px; overflow: hidden;">
                        <iframe src={pdfPreviewUrl} width="100%" height="400px" style="border: none;"></iframe>
                    </div>
                </div>

                <!-- WhatsApp Form -->
                <div class="slds-m-top_medium">
                    <h2 class="slds-text-heading_small slds-m-bottom_small">WhatsApp Details</h2>

                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                            <lightning-input
                                label="Phone Number"
                                type="tel"
                                value={phone}
                                onchange={handlePhoneChange}
                                placeholder="+91XXXXXXXXXX"
                                required>
                            </lightning-input>
                        </div>

                        <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                            <lightning-input
                                label="Recipient Name"
                                type="text"
                                value={recipientName}
                                onchange={handleNameChange}
                                placeholder="Customer name"
                                required>
                            </lightning-input>
                        </div>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="slds-m-top_medium slds-text-align_right">
                    <lightning-button
                        label="Cancel"
                        onclick={handleCancel}
                        class="slds-m-right_small">
                    </lightning-button>
                    <lightning-button
                        label={sendButtonLabel}
                        variant="brand"
                        onclick={handleSend}
                        disabled={isSendDisabled}
                        icon-name="utility:chat">
                    </lightning-button>
                </div>
            </template>

        </div>

    </lightning-card>
</template>
