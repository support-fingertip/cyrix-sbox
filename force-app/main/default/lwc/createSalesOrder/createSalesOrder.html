<template>
    <!-- ================= MAIN CONTENT ================= -->
    <template if:false={isLoading}>
        <div>
            <div class="cso-container">

                <!-- Gradient Header -->
                <div class="gradient-header">
                    <h2 class="cso-title">{pageTitle}</h2>
                </div>

                <!-- Body -->
                <div class="cso-body">

                    <!-- Quote Information (read-only) -->
                    <div class="cso-section slds-m-bottom_medium">
                        <div class="cso-section-header">
                            <lightning-icon icon-name="standard:quotes" size="small" class="slds-m-right_small"></lightning-icon>
                            <span class="slds-text-heading_small">Quote Information</span>
                        </div>
                        <div class="cso-section-body">
                            <div class="slds-grid slds-wrap slds-gutters_small">
                                <div class="slds-col slds-size_1-of-3 slds-p-around_x-small">
                                    <div class="slds-text-title">Quote Date</div>
                                    <div class="cso-field-value">{quoteDateDisplay}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-3 slds-p-around_x-small">
                                    <div class="slds-text-title">Quote Valid Till (in days)</div>
                                    <div class="cso-field-value">{validTillDaysDisplay}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-3 slds-p-around_x-small">
                                    <div class="slds-text-title">Opportunity Name</div>
                                    <div class="cso-field-value">{opportunityNameDisplay}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-3 slds-p-around_x-small">
                                    <div class="slds-text-title">Business Vertical</div>
                                    <div class="cso-field-value">{businessVerticalDisplay}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-3 slds-p-around_x-small">
                                    <div class="slds-text-title">Shipping Mode</div>
                                    <div class="cso-field-value">{shippingModeDisplay}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-3 slds-p-around_x-small">
                                    <div class="slds-text-title">Delivery</div>
                                    <div class="cso-field-value">{deliveryDisplay}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-3 slds-p-around_x-small">
                                    <div class="slds-text-title">Contract Period From Date</div>
                                    <div class="cso-field-value">{contractPeriodFromDisplay}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-3 slds-p-around_x-small">
                                    <div class="slds-text-title">Contract Period End Date</div>
                                    <div class="cso-field-value">{contractPeriodEndDisplay}</div>
                                </div>
                                <div class="slds-col slds-size_1-of-3 slds-p-around_x-small">
                                    <div class="slds-text-title">Is Active</div>
                                    <div class="cso-field-value">
                                        <lightning-icon if:true={quoteContext.isActive} icon-name="utility:check" size="x-small"></lightning-icon>
                                        <lightning-icon if:false={quoteContext.isActive} icon-name="utility:close" size="x-small" variant="error"></lightning-icon>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-3 slds-p-around_x-small">
                                    <div class="slds-text-title">Status</div>
                                    <div class="cso-field-value">{statusDisplay}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Bill To / Ship To -->
                    <div class="cso-section slds-m-bottom_medium">
                        <div class="cso-section-header">
                            <lightning-icon icon-name="standard:address" size="small" class="slds-m-right_small"></lightning-icon>
                            <span class="slds-text-heading_small">Bill To / Ship To</span>
                        </div>
                        <div class="cso-section-body">
                            <div class="slds-grid slds-wrap slds-gutters">
                                <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                    <div class="cso-subheader">BILL TO</div>
                                    <div class="cso-addr-row"><span class="slds-text-title">Name</span><span class="cso-addr-val">{billToNameDisplay}</span></div>
                                    <div class="cso-addr-row"><span class="slds-text-title">Street</span><span class="cso-addr-val">{billToStreetDisplay}</span></div>
                                    <div class="cso-addr-row"><span class="slds-text-title">City</span><span class="cso-addr-val">{billToCityDisplay}</span></div>
                                    <div class="cso-addr-row"><span class="slds-text-title">State</span><span class="cso-addr-val">{billToStateDisplay}</span></div>
                                    <div class="cso-addr-row"><span class="slds-text-title">Postal Code</span><span class="cso-addr-val">{billToPostalCodeDisplay}</span></div>
                                    <div class="cso-addr-row"><span class="slds-text-title">Country</span><span class="cso-addr-val">{billToCountryDisplay}</span></div>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                    <div class="cso-subheader">SHIP TO</div>
                                    <div class="cso-addr-row"><span class="slds-text-title">Name</span><span class="cso-addr-val">{shipToNameDisplay}</span></div>
                                    <div class="cso-addr-row"><span class="slds-text-title">Street</span><span class="cso-addr-val">{shipToStreetDisplay}</span></div>
                                    <div class="cso-addr-row"><span class="slds-text-title">City</span><span class="cso-addr-val">{shipToCityDisplay}</span></div>
                                    <div class="cso-addr-row"><span class="slds-text-title">State</span><span class="cso-addr-val">{shipToStateDisplay}</span></div>
                                    <div class="cso-addr-row"><span class="slds-text-title">Postal Code</span><span class="cso-addr-val">{shipToPostalCodeDisplay}</span></div>
                                    <div class="cso-addr-row"><span class="slds-text-title">Country</span><span class="cso-addr-val">{shipToCountryDisplay}</span></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Payment Terms (read-only, copied from Quote) -->
                    <div class="cso-section slds-m-bottom_medium">
                        <div class="cso-section-header">
                            <lightning-icon icon-name="standard:task2" size="small" class="slds-m-right_small"></lightning-icon>
                            <span class="slds-text-heading_small">Payment Terms</span>
                            <span class="cso-readonly-tag slds-m-left_small">Read only</span>
                        </div>
                        <div class="cso-section-body">
                            <template if:true={hasPaymentTerms}>
                                <pre class="cso-payment-terms">{quoteContext.paymentTerms}</pre>
                            </template>
                            <template if:false={hasPaymentTerms}>
                                <p class="slds-text-color_weak">No Payment Terms on the source Quote.</p>
                            </template>
                        </div>
                    </div>

                    <!-- Remarks -->
                    <div class="slds-m-bottom_medium">
                        <lightning-textarea
                            label="Remarks"
                            value={remarks}
                            onchange={handleRemarksChange}
                            placeholder="Enter remarks">
                        </lightning-textarea>
                    </div>

                    <!-- Order Items -->
                    <div class="cso-items-header">
                        <div class="slds-text-heading_small">Order Items</div>
                        <lightning-button
                            label="Add Product"
                            variant="brand-outline"
                            icon-name="utility:add"
                            onclick={handleToggleAddProduct}>
                        </lightning-button>
                    </div>

                    <!-- Inline Add Product panel -->
                    <template if:true={isAddProductOpen}>
                        <div class="cso-add-product-panel slds-m-bottom_medium">
                            <div class="cso-add-product-title">
                                <lightning-icon icon-name="utility:add" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                Add Product
                            </div>
                            <div class="slds-grid slds-wrap slds-gutters_small cso-add-product-fields">
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                    <lightning-combobox
                                        label="Product"
                                        value={newPricebookEntryId}
                                        placeholder="Select a product"
                                        options={productOptions}
                                        onchange={handleNewProductChange}
                                        required>
                                    </lightning-combobox>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                    <lightning-input
                                        type="number"
                                        label="Quantity"
                                        value={newQuantity}
                                        min="1"
                                        step="1"
                                        onchange={handleNewQuantityChange}>
                                    </lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                    <lightning-input
                                        type="number"
                                        label="Discount (%)"
                                        value={newDiscount}
                                        min="0"
                                        max="100"
                                        step="0.01"
                                        onchange={handleNewDiscountChange}>
                                    </lightning-input>
                                </div>
                            </div>
                            <div class="cso-add-product-actions">
                                <button class="cancel-button" onclick={handleCloseAddProduct}>Cancel</button>
                                <button class="confirm-button" onclick={handleAddProduct}>
                                    <lightning-icon icon-name="utility:add" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                    Add
                                </button>
                            </div>
                        </div>
                    </template>

                    <template if:true={hasItems}>
                        <div class="table-scroll-wrapper">
                            <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-table_fixed-layout cso-items-table">
                                <colgroup>
                                    <col style="width: 4%;">
                                    <col style="width: 20%;">
                                    <col style="width: 6%;">
                                    <col style="width: 7%;">
                                    <col style="width: 9%;">
                                    <col style="width: 9%;">
                                    <col style="width: 7%;">
                                    <col style="width: 6%;">
                                    <col style="width: 11%;">
                                    <col style="width: 10%;">
                                    <col style="width: 6%;">
                                </colgroup>
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Product</th>
                                        <th>UOM</th>
                                        <th>Qty</th>
                                        <th>List Price</th>
                                        <th>Sales Price</th>
                                        <th>Disc. %</th>
                                        <th>Tax %</th>
                                        <th>Price Status</th>
                                        <th>Line Total</th>
                                        <th class="slds-text-align_center">Del</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={displayItems} for:item="item" for:index="idx">
                                        <tr key={item.rowKey}>
                                            <td>{item.rowNum}</td>
                                            <td class="product-cell">
                                                <div class="cso-product-name">{item.productName}</div>
                                                <template if:true={item.pricebookName}>
                                                    <div class="cso-pricebook-badge">{item.pricebookName}</div>
                                                </template>
                                                <template if:true={item.productCode}>
                                                    <div class="cso-product-code">{item.productCode}</div>
                                                </template>
                                            </td>
                                            <td>{item.uomDisplay}</td>
                                            <td>
                                                <lightning-input
                                                    type="number"
                                                    variant="label-hidden"
                                                    label="Qty"
                                                    value={item.quantity}
                                                    min="1"
                                                    step="1"
                                                    data-row-key={item.rowKey}
                                                    onchange={handleQuantityChange}>
                                                </lightning-input>
                                            </td>
                                            <td>{item.listPriceDisplay}</td>
                                            <td>{item.unitPriceDisplay}</td>
                                            <td>
                                                <lightning-input
                                                    type="number"
                                                    variant="label-hidden"
                                                    label="Discount"
                                                    value={item.discount}
                                                    min="0"
                                                    max="100"
                                                    step="0.01"
                                                    data-row-key={item.rowKey}
                                                    onchange={handleDiscountChange}>
                                                </lightning-input>
                                            </td>
                                            <td>{item.taxDisplay}</td>
                                            <td>
                                                <template if:true={item.priceStatus}>
                                                    <span class={item.priceStatusBadgeClass}>{item.priceStatus}</span>
                                                </template>
                                            </td>
                                            <td>{item.totalPriceDisplay}</td>
                                            <td class="slds-text-align_center">
                                                <lightning-button-icon
                                                    icon-name="utility:delete"
                                                    alternative-text="Delete row"
                                                    title="Delete row"
                                                    variant="bare"
                                                    data-row-key={item.rowKey}
                                                    onclick={handleDeleteRow}>
                                                </lightning-button-icon>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                    <template if:false={hasItems}>
                        <div class="slds-text-align_center slds-p-around_medium">
                            <lightning-icon icon-name="utility:info" size="medium"></lightning-icon>
                            <p>No products on the order. Click "Add Product" to add one.</p>
                        </div>
                    </template>

                </div>

                <!-- Gradient Footer -->
                <div class="gradient-footer">
                    <button class="cancel-button" onclick={handleCancel} disabled={isSaving}>Cancel</button>
                    <button class="confirm-button" onclick={handleConfirm} disabled={isConfirmDisabled}>
                        <lightning-icon icon-name="utility:check" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        {confirmButtonLabel}
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- ================= LOADING / SAVING ================= -->
    <template if:true={isLoading}>
        <div class="slds-is-relative slds-p-around_medium">
            <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
        </div>
    </template>
    <template if:true={isSaving}>
        <lightning-spinner alternative-text="Saving..." size="medium"></lightning-spinner>
    </template>
</template>
