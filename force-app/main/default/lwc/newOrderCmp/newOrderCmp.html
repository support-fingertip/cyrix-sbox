<template>
    <template if:true={isLoading}>
        <div class="loading-overlay">
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </div>
    </template>

    <div class="qw-canvas">
        <div class="qw-shell">

            <!-- ========== HEADER ========== -->
            <div class="qw-header">
                <div class="qw-header-top">
                    <div class="qw-header-icon">
                        <lightning-icon icon-name="utility:orders" size="small"></lightning-icon>
                    </div>
                    <div class="qw-header-text">
                        <div class="qw-header-title">{pageTitle}</div>
                        <div class="qw-header-sub">
                            <span>Step {currentStep} of 6 · {currentStepLabel}</span>
                            <template if:true={accountName}>
                                <span class="qw-customer-chip">
                                    <lightning-icon icon-name="utility:company" size="xx-small"></lightning-icon>
                                    {accountName}
                                </span>
                            </template>
                        </div>
                    </div>
                    <button type="button" class="qw-close-btn" title="Cancel" onclick={handleCancel}>×</button>
                </div>
                <div class="qw-progress-track">
                    <div class="qw-progress-fill" style={progressFillStyle}></div>
                </div>
                <div class="qw-progress-meta">
                    <span>{progressPercent}% complete</span>
                    <template if:true={isEditMode}>
                        <span>Editing existing order</span>
                    </template>
                </div>
            </div>

            <!-- ========== STEPPER ========== -->
            <div class="qw-stepper">
                <template for:each={stepList} for:item="s">
                    <div key={s.num} class={s.cssClass} data-step={s.num} onclick={handleStepJump}>
                        <span class="qw-step-dot">{s.num}</span>
                        <span class="qw-step-label">{s.label}</span>
                    </div>
                </template>
            </div>

            <!-- ========== BODY ========== -->
            <div class="qw-body">
                <lightning-record-edit-form
                    object-api-name="Order"
                    record-id={editRecordId}
                    onsubmit={handleFormSubmit}
                    onsuccess={handleFormSuccess}
                    onerror={handleFormError}
                    density="comfy">

                    <!-- Hidden Name field -->
                    <div class="slds-hide">
                        <lightning-input-field field-name="Name" value={orderName}></lightning-input-field>
                    </div>

                    <!-- ===== STEP 1: ORDER INFO ===== -->
                    <div class={step1Class}>
                        <div class="qw-section-title">Order information</div>
                        <div class="qw-section-sub">Pick the source Quote — account, opportunity, verticals and line items follow.</div>
                        <div class="qw-grid-2">
                            <div class="qw-field">
                                <template if:true={isEditMode}>
                                    <lightning-input-field
                                        field-name="QuoteId"
                                        value={defaultSourceQuoteId}
                                        disabled
                                        required>
                                    </lightning-input-field>
                                </template>
                                <template if:false={isEditMode}>
                                    <lightning-record-picker
                                        label="Quote"
                                        placeholder="Search quotes…"
                                        object-api-name="Quote"
                                        value={defaultSourceQuoteId}
                                        onchange={handleQuoteChange}
                                        required>
                                    </lightning-record-picker>
                                </template>
                            </div>
                            <div class="qw-field"><lightning-input-field field-name="EffectiveDate" value={defaultEffectiveDate} required></lightning-input-field></div>
                            <div class="qw-field"><lightning-input-field field-name="EndDate"></lightning-input-field></div>
                            <div class="qw-field"><lightning-input-field field-name="AccountId" value={defaultAccountId} disabled required></lightning-input-field></div>
                            <div class="qw-field"><lightning-input-field field-name="OpportunityId" value={defaultOpportunityId} disabled></lightning-input-field></div>
                            <div class="qw-field">
                                <div class="qw-field-label">Business Vertical</div>
                                <div class="qw-readonly-input">{businessVerticalDisplay}</div>
                            </div>
                            <div class="qw-field">
                                <div class="qw-field-label">Sub Vertical</div>
                                <div class="qw-readonly-input">{subVerticalDisplay}</div>
                            </div>
                            <div class="qw-field"><lightning-input-field field-name="Shipping_Mode__c" value={defaultShippingMode}></lightning-input-field></div>
                            <div class="qw-field"><lightning-input-field field-name="Delivery__c" value={defaultDelivery}></lightning-input-field></div>
                            <div class="qw-field"><lightning-input-field field-name="Contract_Period_From_Date__c" value={defaultContractFrom} disabled></lightning-input-field></div>
                            <div class="qw-field"><lightning-input-field field-name="Contract_Period_End_Date__c" value={defaultContractEnd} disabled></lightning-input-field></div>
                        </div>
                    </div>

                    <!-- ===== STEP 2: ADDRESSES ===== -->
                    <div class={step2Class}>
                        <div class="qw-section-title">Addresses</div>
                        <div class="qw-section-sub">Where to invoice, where to deliver.</div>
                        <label class="qw-same-addr">
                            <input type="checkbox" checked={sameAsBilling} onchange={handleSameAsBillingChange} />
                            <span>Shipping address is the same as billing</span>
                        </label>
                        <div class="qw-bill-ship">
                            <div class="qw-card">
                                <div class="qw-card-head">
                                    <span class="qw-card-icon">
                                        <lightning-icon icon-name="utility:company" size="xx-small"></lightning-icon>
                                    </span>
                                    Bill to
                                    <span class="qw-card-sub">Invoice recipient</span>
                                </div>
                                <c-address-input
                                    label="Billing Address"
                                    name={billingAddress.name}
                                    street={billingAddress.street}
                                    city={billingAddress.city}
                                    state={billingAddress.state}
                                    postal-code={billingAddress.postalCode}
                                    country={billingAddress.country}
                                    hide-search
                                    onaddresschange={handleBillingAddressChange}>
                                </c-address-input>
                            </div>
                            <div class="qw-card">
                                <div class="qw-card-head">
                                    <span class="qw-card-icon">
                                        <lightning-icon icon-name="utility:shipping" size="xx-small"></lightning-icon>
                                    </span>
                                    Ship to
                                    <span class="qw-card-sub">Delivery location</span>
                                </div>
                                <c-address-input
                                    label="Shipping Address"
                                    name={shippingAddress.name}
                                    street={shippingAddress.street}
                                    city={shippingAddress.city}
                                    state={shippingAddress.state}
                                    postal-code={shippingAddress.postalCode}
                                    country={shippingAddress.country}
                                    hide-search
                                    onaddresschange={handleShippingAddressChange}>
                                </c-address-input>
                            </div>
                        </div>
                    </div>

                    <!-- ===== STEP 3: PRODUCTS ===== -->
                    <div class={step3Class}>
                        <div class="qw-section-title">Products</div>
                        <div class="qw-section-sub">Edit the inherited line items or search the catalog to add more.</div>

                        <div class="qw-product-search">
                            <lightning-input
                                label="Search products"
                                value={searchTerm}
                                onchange={handleSearchTermChange}
                                onkeydown={handleSearchKeydown}
                                placeholder="Search by name or code…"
                                type="text">
                            </lightning-input>
                            <lightning-combobox
                                label="Product type"
                                value={categoryFilter}
                                options={categoryOptions}
                                onchange={handleCategoryFilterChange}
                                placeholder="All types">
                            </lightning-combobox>
                            <button type="button" class="qw-btn primary" onclick={handleSearch} disabled={isSearchDisabled}>Search</button>
                        </div>

                        <template if:true={showSearchResults}>
                            <template if:true={hasSearchResults}>
                                <div class="qw-search-results">
                                    <div class="qw-table-scroll">
                                        <table class="qw-search-table">
                                            <thead>
                                                <tr>
                                                    <th>Product</th>
                                                    <th>Code</th>
                                                    <th>Category</th>
                                                    <th>Unit price</th>
                                                    <th>Tax %</th>
                                                    <th class="add-cell"></th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template for:each={searchResults} for:item="prod">
                                                    <tr key={prod.pricebookEntryId}>
                                                        <td>{prod.productName}</td>
                                                        <td>{prod.productCode}</td>
                                                        <td>{prod.category}</td>
                                                        <td>{prod.formattedPrice}</td>
                                                        <td>{prod.formattedTax}</td>
                                                        <td class="add-cell">
                                                            <button type="button" class="qw-btn primary" data-id={prod.pricebookEntryId} onclick={handleAddProduct}>+ Add</button>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </template>
                            <template if:true={noSearchResults}>
                                <div class="qw-search-empty">No products found matching your search.</div>
                            </template>
                        </template>

                        <div class="qw-line-items-label">
                            Line items
                            <span class="qw-count-badge">{lineItemCount}</span>
                        </div>

                        <template if:true={hasLineItems}>
                            <template for:each={lineItems} for:item="item">
                                <div key={item.rowId} class="qw-line-item">
                                    <div class="qw-line-head">
                                        <div class="qw-line-thumb">{item.productInitial}</div>
                                        <div>
                                            <div class="qw-line-name">{item.productName}</div>
                                            <div class="qw-line-meta">
                                                <span>{item.productCode}</span>
                                                <template if:true={item.isServiceItem}>
                                                    <span class="qw-service-badge">Service item</span>
                                                </template>
                                                <template if:true={item.hasPriceSource}>
                                                    <span class={item.priceBadgeClass}>{item.priceBadgeLabel}</span>
                                                </template>
                                            </div>
                                        </div>
                                        <button type="button" class="qw-trash" title="Remove" data-row-id={item.rowId} onclick={handleRemoveLineItem}>
                                            <lightning-icon icon-name="utility:delete" size="xx-small"></lightning-icon>
                                        </button>
                                    </div>
                                    <div class="qw-line-divider"></div>
                                    <div class="qw-line-fields">
                                        <div>
                                            <div class="qw-field-label">UOM</div>
                                            <div class="qw-field-static muted">{item.uom}</div>
                                        </div>
                                        <div>
                                            <div class="qw-field-label">Qty</div>
                                            <lightning-input
                                                type="number" value={item.quantity} min="1" step="1"
                                                variant="label-hidden"
                                                data-row-id={item.rowId} data-field="quantity"
                                                onchange={handleLineItemChange}>
                                            </lightning-input>
                                        </div>
                                        <div>
                                            <div class="qw-field-label">List price</div>
                                            <div class="qw-field-static muted">
                                                <lightning-formatted-number value={item.listPrice} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                                            </div>
                                        </div>
                                        <div>
                                            <div class="qw-field-label">Sales price</div>
                                            <template if:true={item.isServiceItem}>
                                                <lightning-input
                                                    type="number" value={item.unitPrice} min="0" step="0.01"
                                                    variant="label-hidden" formatter="currency"
                                                    data-row-id={item.rowId} data-field="unitPrice"
                                                    onchange={handleLineItemChange}>
                                                </lightning-input>
                                            </template>
                                            <template if:false={item.isServiceItem}>
                                                <div class="qw-field-static">
                                                    <lightning-formatted-number value={item.unitPrice} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                                                </div>
                                            </template>
                                        </div>
                                        <div>
                                            <div class="qw-field-label">Discount %</div>
                                            <lightning-input
                                                type="number" value={item.discount} min="0" max="100" step="0.01"
                                                variant="label-hidden"
                                                data-row-id={item.rowId} data-field="discount"
                                                onchange={handleLineItemChange}>
                                            </lightning-input>
                                        </div>
                                        <div>
                                            <div class="qw-field-label">Max Disc %</div>
                                            <template if:true={item.hasMaxDiscount}>
                                                <div class="qw-field-static">{item.maxDiscountDisplay}</div>
                                            </template>
                                            <template if:false={item.hasMaxDiscount}>
                                                <div class="qw-field-static muted">—</div>
                                            </template>
                                        </div>
                                        <div>
                                            <div class="qw-field-label">Tax %</div>
                                            <div class="qw-field-static muted">{item.taxPercentDisplay}</div>
                                            <template if:false={item.isServiceItem}>
                                                <div class="qw-field-hint">N/A for non-service</div>
                                            </template>
                                        </div>
                                        <div>
                                            <div class="qw-field-label">Status</div>
                                            <template if:true={item.priceStatus}>
                                                <span class={item.qwStatusClass}>{item.priceStatus}</span>
                                            </template>
                                        </div>
                                        <div>
                                            <div class="qw-field-label">Line total</div>
                                            <div class="qw-line-total">
                                                <lightning-formatted-number value={item.lineTotal} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </template>

                        <template if:false={hasLineItems}>
                            <div class="qw-empty">No products in this order yet. Pick a Quote on step 1 to inherit its products, or use the search to add products directly.</div>
                        </template>

                        <div class="qw-summary">
                            <div class="qw-sum-row">
                                <span>Subtotal</span>
                                <span class="qw-sum-val"><lightning-formatted-number value={subtotal} format-style="currency" currency-code={currencyCode}></lightning-formatted-number></span>
                            </div>
                            <div class="qw-sum-row">
                                <span>Discount</span>
                                <span class="qw-sum-val">- <lightning-formatted-number value={totalDiscount} format-style="currency" currency-code={currencyCode}></lightning-formatted-number></span>
                            </div>
                            <div class="qw-sum-row">
                                <span>Tax</span>
                                <span class="qw-sum-val"><lightning-formatted-number value={totalTax} format-style="currency" currency-code={currencyCode}></lightning-formatted-number></span>
                            </div>
                            <div class="qw-sum-row total">
                                <span>Grand total</span>
                                <span class="qw-sum-val"><lightning-formatted-number value={grandTotal} format-style="currency" currency-code={currencyCode}></lightning-formatted-number></span>
                            </div>
                        </div>
                    </div>

                    <!-- ===== STEP 4: PAYMENT ===== -->
                    <div class={step4Class}>
                        <div class="qw-section-title">Payment terms</div>
                        <div class="qw-section-sub">Inherited from the source Quote — adjust if needed. Total must equal 100%.</div>

                        <template if:true={hasPaymentTerms}>
                            <div class="qw-payment-header">
                                <div>#</div>
                                <div>Term description</div>
                                <div>Percentage</div>
                                <div></div>
                            </div>
                            <template for:each={paymentTerms} for:item="term">
                                <div key={term.ptId} class="qw-payment-row">
                                    <div class="qw-payment-idx">{term.rowNumber}</div>
                                    <lightning-input
                                        type="text" value={term.paymentTerm} variant="label-hidden"
                                        placeholder="e.g. 30% Advance"
                                        data-pt-id={term.ptId} data-field="paymentTerm"
                                        onchange={handlePaymentTermChange}>
                                    </lightning-input>
                                    <lightning-input
                                        type="number" value={term.percentage} min="0" max="100" step="1"
                                        variant="label-hidden"
                                        data-pt-id={term.ptId} data-field="percentage"
                                        onchange={handlePaymentTermChange}>
                                    </lightning-input>
                                    <button type="button" class="qw-trash" title="Remove" data-pt-id={term.ptId} onclick={handleRemovePaymentTerm}>
                                        <lightning-icon icon-name="utility:delete" size="xx-small"></lightning-icon>
                                    </button>
                                </div>
                            </template>
                        </template>

                        <button type="button" class="qw-add-row-btn" onclick={handleAddPaymentTerm}>
                            <lightning-icon icon-name="utility:add" size="xx-small"></lightning-icon>
                            Add payment term
                        </button>

                        <template if:true={hasPaymentTerms}>
                            <div class={paymentTotalClass}>
                                <span class="dot"></span>
                                <span>Total {totalPercentage}% · {paymentTotalText}</span>
                            </div>
                        </template>
                    </div>

                    <!-- ===== STEP 5: NOTES ===== -->
                    <div class={step5Class}>
                        <div class="qw-section-title">Notes</div>
                        <div class="qw-section-sub">Add any notes the order should carry. Surfaced on the order record.</div>
                        <div class="qw-card" style="padding:16px;">
                            <lightning-input-field field-name="Description"></lightning-input-field>
                        </div>
                    </div>

                    <!-- ===== STEP 6: REVIEW ===== -->
                    <div class={step6Class}>
                        <div class="qw-section-title">Review &amp; submit</div>
                        <div class="qw-section-sub">Quick check before saving the order.</div>
                        <div class="qw-review-grid">
                            <div class="qw-review-card">
                                <div class="qw-review-head">
                                    Order info
                                    <button type="button" class="qw-review-edit" data-step="1" onclick={handleStepJump}>Edit</button>
                                </div>
                                <div class="qw-review-row"><span class="qw-review-label">Account</span><span class="qw-review-val">{accountNameDisplay}</span></div>
                                <div class="qw-review-row"><span class="qw-review-label">Vertical</span><span class="qw-review-val">{businessVerticalDisplay}</span></div>
                                <div class="qw-review-row"><span class="qw-review-label">Effective date</span><span class="qw-review-val">{defaultEffectiveDate}</span></div>
                            </div>
                            <div class="qw-review-card">
                                <div class="qw-review-head">
                                    Addresses
                                    <button type="button" class="qw-review-edit" data-step="2" onclick={handleStepJump}>Edit</button>
                                </div>
                                <div class="qw-review-row"><span class="qw-review-label">Bill to</span><span class="qw-review-val">{billingSummary}</span></div>
                                <div class="qw-review-row"><span class="qw-review-label">Ship to</span><span class="qw-review-val">{shippingSummary}</span></div>
                            </div>
                            <div class="qw-review-card">
                                <div class="qw-review-head">
                                    Products
                                    <button type="button" class="qw-review-edit" data-step="3" onclick={handleStepJump}>Edit</button>
                                </div>
                                <div class="qw-review-row"><span class="qw-review-label">Line items</span><span class="qw-review-val">{lineItemCount}</span></div>
                                <div class="qw-review-row"><span class="qw-review-label">Grand total</span><span class="qw-review-val"><lightning-formatted-number value={grandTotal} format-style="currency" currency-code={currencyCode}></lightning-formatted-number></span></div>
                            </div>
                            <div class="qw-review-card">
                                <div class="qw-review-head">
                                    Payment
                                    <button type="button" class="qw-review-edit" data-step="4" onclick={handleStepJump}>Edit</button>
                                </div>
                                <div class="qw-review-row"><span class="qw-review-label">Terms</span><span class="qw-review-val">{paymentTermCount}</span></div>
                                <div class="qw-review-row"><span class="qw-review-label">Total</span><span class="qw-review-val">{totalPercentage}%</span></div>
                            </div>
                        </div>
                        <div class="qw-info-card">
                            <lightning-icon icon-name="utility:info" size="x-small"></lightning-icon>
                            <span>Before you submit, double-check the line items and totals. Use the Edit chips above to jump back to any step.</span>
                        </div>
                    </div>

                    <!-- ========== FOOTER ========== -->
                    <div class="qw-footer">
                        <div class="qw-footer-actions">
                            <button type="button" class="qw-btn" onclick={handleStepBack} disabled={isFirstStep}>Back</button>
                            <template if:true={isLastStep}>
                                <button type="submit" class="qw-btn success" disabled={isSaveDisabled}>{saveButtonLabel}</button>
                            </template>
                            <template if:false={isLastStep}>
                                <button type="button" class="qw-btn primary" onclick={handleStepNext}>Continue →</button>
                            </template>
                        </div>
                    </div>

                </lightning-record-edit-form>
            </div>

        </div>
    </div>
</template>
